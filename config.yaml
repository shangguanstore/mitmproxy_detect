# mitmproxy 流量捕获配置
# ================================

# 目标站点过滤列表（留空则捕获所有流量）
# 支持域名子串匹配，例如 "example.com" 会匹配 api.example.com、www.example.com
target_sites:
  # - example.com
  # - api.myservice.com
  # - httpbin.org

# 日志文件路径（相对于 traffic_logger.py 所在目录）
log_file: logs/traffic.jsonl

# 单个请求/响应 body 最大记录字节数（超出部分会被截断）
max_body_size: 102400  # 100 KB

# mitmproxy 监听端口（正向代理模式）
proxy_port: 8081

# Web 查看器端口
viewer_port: 8888

# 上游代理（正向代理模式专用，Clash 等）
# mitmproxy 捕获后会将流量转发到此代理，再由 Clash 路由出去
# 留空则直连（不经过 Clash）
upstream_proxy: http://127.0.0.1:7890

# ================================
# Relay 模式（反向代理，拦截不转发）
# 使用场景：开发机修改 hosts 将域名指向本服务器，服务器接住流量并解析
# 启动方式：./start_relay.sh
# ================================

# 是否启用 relay 模式
relay_mode: false

# 对外暴露的端口（开发机 hosts 指向这里）
relay_http_port: 80
relay_https_port: 443

# mitmdump 实际监听的内部端口（普通用户权限即可）
# start_relay.sh 会自动用 iptables 将 relay_http_port → relay_http_internal_port
relay_http_internal_port: 8082
relay_https_internal_port: 8083

# relay 模式下对目标域名返回的 HTTP 状态码
relay_response_code: 200
